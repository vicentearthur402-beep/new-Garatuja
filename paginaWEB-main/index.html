<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

    * {
      box-sizing: border-box;
    }

    :root {
      --grid-info-size: 250px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      display: grid;
      grid-template-areas:
        "social info   content"
        "footer footer footer";
      grid-template-columns: fit-content var(--grid-info-size) 1fr;
      grid-template-rows: 1fr 120px;
      gap: .5rem;
      padding: .5rem;
      min-height: 100svh;
    }

    aside {
      display: flex;
      flex-direction: column;
      align-items: center;
      
    
      grid-area: info;

      .thumb {
        width: calc(var(--grid-info-size) - 20px);
        height: calc(var(--grid-info-size) - 20px);
        background-color: lightgray;
        border-radius: 50%;
        flex: none;
        z-index: 2;
        overflow: clip;

        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
      }

      section {
        background-color: lightcoral;
        width: 100%;
        height: 100%;
        margin-top: -4rem;
        padding-top: 4rem;
        z-index: 1;
        clip-path: polygon(0 20px, 0 100%, 100% 100%, 100% 0);
      }
    }

    main {
      grid-area: content;
      position: relative;
      isolation: isolate;
      padding: 2rem;



      &:before {
        content: "";
        background-color: blueviolet;
        position: absolute;
        inset: 0;
        z-index: -1;
        clip-path: polygon(0 calc(var(--grid-info-size) - 5.3rem), 0 100%, 100% 100%, 100% calc(var(--grid-info-size) - 8rem) );
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(200px, 1fr));
        grid-auto-rows: minmax(180px,230px);
        gap: .5rem;


        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        :first-child {
          grid-row: span 2;
          grid-column: 1 / span 3;
        }
      }
    } 

    .social {
      grid-area: social;
      display: flex;
      flex-direction: column;
    justify-content: flex-end;
    align-items: center;


        img {
      height: 2rem;
      width: 2rem;
    }
    }


    footer {
      grid-area: footer;
    }
  </style>
</head>

<body>
<aside>
    <div class="thumb">
      <img src="image2.png" alt="profile">
    </div>
    <section>aside</section>
  </aside>
  <main>
    <article>
      <h1>Gabriel Barbosa (gabigol)</h1>
      <p>
Gabriel Barbosa é um jogador talentoso que conquistou seu espaço no futebol brasileiro e continua a ser uma figura importante no cenário esportivo nacional.
      </p>
    </article>
    <div class="gallery">
