<!DOCTYPE html>

<head>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

    * {
      box-sizing: border-box;
    }

    :root {
      --grid-info-size: 250px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      color: white;
    }

    body {
      display: grid;
      grid-template-areas:
        "social info   content"
        "footer footer footer";
      grid-template-columns: fit-content var(--grid-info-size) 1fr;
      grid-template-rows: 1fr 120px;
      gap: .5rem;
      padding: .5rem;
      min-height: 100svh;
    }

    aside {
      display: flex;
      flex-direction: column;
      align-items: center;
      
    
      grid-area: info;

      .thumb {
        width: calc(var(--grid-info-size) - 20px);
        height: calc(var(--grid-info-size) - 20px);
        background-color: lightgray;
        border-radius: 50%;
        flex: none;
        z-index: 2;
        overflow: clip;

        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
      }

      section {
        background-color: rgb(0, 0, 0);
        width: 100%;
        height: 100%;
        margin-top: -4rem;
        padding-top: 4rem;
        z-index: 1;
        clip-path: polygon(0 20px, 0 100%, 100% 100%, 100% 0);
      }
    }

    main {
      grid-area: content;
      position: relative;
      isolation: isolate;
      padding: 2rem;



      &:before {
        content: "";
        background-color: rgb(6, 4, 8);
        position: absolute;
        inset: 0;
        z-index: -1;
        clip-path: polygon(0 calc(var(--grid-info-size) - 5.3rem), 0 100%, 100% 100%, 100% calc(var(--grid-info-size) - 8rem) );
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(200px, 1fr));
        grid-auto-rows: minmax(180px,230px);
        gap: .5rem;


        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        :first-child {
          grid-row: span 2;
          grid-column: 1 / span 3;
        }
      }
    } 

    .social {
      grid-area: social;
      display: flex;
      flex-direction: column;
    justify-content: flex-end;
    align-items: center;


        img {
      height: 2rem;
      width: 2rem;
    }
    }


    footer {
      grid-area: footer;
    }

   
      body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('02ad97ed-ddb9-4b75-b6e7-901a61a79448.jpg') no-repeat center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  z-index: -1;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}

p,aside {
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  line-height: 1.6;
}
section,footer {
  text-align: center;
}
  </style>
</head>
